<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Debugging by Elimination</title>
<style>
  :root{
    --bg:#101418; --panel:#171d23; --panel2:#1c242c; --line:#2a333c;
    --ink:#dce4ea; --muted:#8b98a5; --faint:#5c6a76;
    --space:#7f77dd; --dead:#2b333b; --crash:#e06a3e; --skew:#d4a13f; --fixed:#2f8a68;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--bg); color:var(--ink);
    font-family:"Hiragino Sans","Noto Sans JP",-apple-system,sans-serif;
    font-size:15px; line-height:1.75;
    display:flex; justify-content:center; padding:32px 16px 64px;
  }
  .wrap{max-width:880px; width:100%}
  h1{font-size:20px; font-weight:600; margin-bottom:4px}
  .sub{color:var(--muted); font-size:13px; margin-bottom:14px}

  .tabs{display:flex; gap:6px; margin-bottom:12px; flex-wrap:wrap}
  .tab{font-size:13px; padding:6px 16px; border-radius:999px; border:1px solid var(--line);
    color:var(--faint); background:none; cursor:pointer; font-family:inherit; transition:all .25s}
  .tab:hover{border-color:var(--muted)}
  .tab.on{color:var(--ink); border-color:var(--space); background:rgba(127,119,221,.12)}

  .panel{background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:12px}
  canvas{display:block; width:100%; height:auto; border-radius:8px; background:var(--panel2);
    touch-action:none; cursor:grab}
  canvas:active{cursor:grabbing}

  .statusrow{display:flex; align-items:center; gap:14px; padding:10px 4px 0; flex-wrap:wrap}
  .counter{font-size:13px; color:var(--muted)}
  .counter b{color:var(--ink); font-size:16px; font-weight:600}
  .bar{flex:1; min-width:120px; height:6px; background:var(--dead); border-radius:3px; overflow:hidden}
  .bar i{display:block; height:100%; background:var(--space); border-radius:3px; transition:width .6s}

  .frametitle{font-size:14px; padding:12px 4px 0; color:var(--ink)}
  .frametitle b{font-weight:600}
  .tracks{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:12px}
  @media(max-width:640px){.tracks{grid-template-columns:1fr}}
  .track{background:var(--panel2); border:1px solid var(--line); border-radius:10px; padding:12px 14px; min-height:150px}
  .track h4{font-size:12px; font-weight:600; color:var(--faint); letter-spacing:.06em; margin-bottom:6px}
  .track div{font-size:13.5px; color:var(--muted)}
  .track b{color:var(--ink); font-weight:600}
  .track .opt{margin-top:8px; padding-top:8px; border-top:1px dashed var(--line)}
  .track .opt em{font-style:normal; color:var(--skew)}

  .ctrl{display:flex; align-items:center; gap:10px; padding:14px 2px 0; flex-wrap:wrap}
  button.nav{background:none; border:1px solid var(--line); color:var(--ink);
    border-radius:8px; padding:7px 16px; font-size:13px; cursor:pointer; font-family:inherit}
  button.nav:hover:not(:disabled){border-color:var(--muted)}
  button.nav:disabled{opacity:.35; cursor:default}
  .dots{font-size:10px; color:var(--faint); letter-spacing:3px}
  .hint{margin-left:auto; font-size:12px; color:var(--faint)}
</style>
</head>
<body>
<div class="wrap">
  <h1 id="h1">Debugging by Elimination</h1>
  <p class="sub" id="sub">Whatever remains, however improbable — each dot is a suspect, and every observation extinguishes the innocent.</p>

  <div class="tabs">
    <button class="tab" id="t0">Intro: only logins fail</button>
    <button class="tab" id="t1">Case: only writes fail</button>
    <button class="tab" id="t2">Hard case: intermittent stalls</button>
    <button class="tab" id="t3">Another kind: you fix it, it comes back</button>
    <button class="tab" id="langbtn" style="margin-left:auto">EN</button>
  </div>

  <div class="panel">
    <canvas id="cv" width="840" height="520"></canvas>
    <div class="statusrow">
      <span class="counter"><span id="cntpre">残り候補</span> <b id="cnt">120</b> / 120</span>
      <div class="bar"><i id="barfill" style="width:100%"></i></div>
      <span class="hint" id="hint">ドラッグで自由回転 / フレーム送りで切断面へ自動移動</span>
    </div>
    <div class="frametitle" id="ftitle"></div>
    <div class="tracks">
      <div class="track"><h4 id="h4act">調査 — この段階でやったこと</h4><div id="act"></div></div>
      <div class="track"><h4 id="h4state">状態 — 削れた候補と選択肢</h4><div id="state"></div></div>
    </div>
    <div class="ctrl">
      <button class="nav" id="prev">戻る</button>
      <button class="nav" id="next">次へ</button>
      <span class="dots" id="fdots"></span>
    </div>
  </div>

// ============ 共通エンジン ============
var W=840,H=520,CX=W/2,CY=H/2,EXTENT=185;
var cv=document.getElementById('cv'), ctx=cv.getContext('2d');
var yaw=0.7, pitch=0.4, dragging=false, px=0, py=0, camAnim=null, clock=0;

function wrapA(a){ while(a>Math.PI)a-=2*Math.PI; while(a<-Math.PI)a+=2*Math.PI; return a; }
function project(x,y,z){
  var cy_=Math.cos(yaw), sy_=Math.sin(yaw), cp=Math.cos(pitch), sp=Math.sin(pitch);
  var x1=x*cy_+z*sy_, z1=-x*sy_+z*cy_;
  return [CX + x1, CY - (y*cp - z1*sp), y*sp + z1*cp];
}
function jit(i,k){ var v=Math.sin(i*127.1+k*311.7)*43758.5453; return (v-Math.floor(v)-0.5)*0.5; }
function lvCoord(li,n,i,k){
  var v=li-(n-1)/2 + jit(i,k);
  return v/((n-1)/2||1)*EXTENT*0.72;
}

function hazeXYZ(i,total){
  var r=205*Math.sqrt((i+1)/total), a=i*2.39996;
  return {x:Math.cos(a)*r*1.05, y:Math.sin(a)*r*0.75, z:jit(i,7)*40};
}

  for(var h=1;h<=12;h++) comps.forEach(function(c){

      loopClass:(c==='アプリ')?'アプリ':((c==='接続プール'||c==='キュー')?'プール':null)});
  });
  var sharedDef=[
    ['LB','入口','LB'],['DNS','入口',null],['認証','入口',null],
    ['キャッシュ','データ層',null],['DB','データ層','DB'],['バックアップ','データ層',null],
    ['リトライ設定','入口','リトライ'],['タイムアウト設定','入口','タイムアウト']
  ];
  sharedDef.forEach(function(d){
    for(var r=0;r<6;r++) S.push({name:d[0]+'-'+(r+1), kind:'shared', sk:d[0],
      comp:d[0], pos:d[1], loopClass:d[2]});
  });
  var Yl=comps.concat(sharedDef.map(function(d){return d[0];}));
  var axesA=[
    {name:'経路上の位置', levels:['入口','アプリ層','データ層'], tick:'all',

    {name:'構成要素', levels:Yl, tick:'all', get:function(s){return Yl.indexOf(s.comp);}},
    {name:'14:00のイベントへの近さ', levels:['遠い','近い'], tick:'all',
     get:function(s){return (s.sk==='バックアップ'||s.sk==='DB')?1:0;}}
  ];
  var ring=['リトライ','LB','アプリ','プール','DB','タイムアウト'];
  var appsCut=function(s){return s.kind==='host'&&(s.comp==='アプリ'||s.comp==='ランタイム'||s.comp==='構成');};
  var frames=[
   {cut:null, cam:{yaw:0.7,pitch:0.4}, axes:axesA, reveal:false,
    t:"<b>0. 報告の検証</b> — 今回は「急に、全部が」",
    act:"14:02から<b>ほぼ全リクエストが遅い</b>。前の2つの事例と違い、散発ではなく全面的、しかも突然。候補120点を灯す。",
    state:"候補:全域。<div class='opt'><em>覚え書き</em>:急に始まった問題は急に解けることが多い——という経験則を、今回は裏切られることになる。</div>"},
   {cut:null, cam:{yaw:0.05,pitch:0.25}, axes:axesA, reveal:false,
    t:"<b>1. 異常なものを探す</b> — 全部が異常",
    act:"いつもなら「異常なメトリクスの場所」から絞る。だが今日は<b>LBの待ち行列も、アプリの応答時間も、DBの負荷も、全部赤い</b>。",
    state:"<b>消灯ゼロ——絞れない</b>。系全体が飽和すると、異常は原因のしるしではなく<b>結果としても</b>現れる。「どこが悪いか」の問いが効かない。"},
   {cut:function(s){return s.kind==='shared'&&(s.sk==='DNS'||s.sk==='認証');}, cam:{yaw:0.05,pitch:0.25}, axes:axesA, reveal:false,
    t:"<b>2. それでも消せるものは消す</b>",
    act:"動いていて当然のものを確かめる:名前解決は即答(dig)、トークン発行も速い(curl)。<b>経路の外側は無事</b>。",
    state:"DNS・認証の<b>12候補が消灯</b>。全面異常の中でも、正常側の確認は変わらず機能する。"},
   {cut:function(s){return s.sk==='キャッシュ';}, cam:{yaw:1.2,pitch:0.4}, axes:axesA, reveal:false,
    t:"<b>3. 始まりを探す</b> — 犯人は過去にいた",
    act:"時系列を巻き戻すと、<b>14:00にDBの自動バックアップ</b>が走り数分間IOが重かった記録。「これだ!」——だがバックアップは<b>14:05に終了済み</b>。今はDBのディスクも静か。なのに遅延は続いている。キャッシュのヒット率も正常。",
    state:"キャッシュの<b>6候補が消灯</b>。そして不気味な事実:<b>始めた犯人は、もう現場にいない</b>。"},
   {cut:appsCut, cam:{yaw:0.05,pitch:0.25}, axes:axesA, reveal:false,
    t:"<b>4. 部品を直して回る</b> — 一度は効いたように見える",
    act:"アプリを順次再起動(元に戻せる操作)→<b>数分間、正常に戻った</b>。直った——ように見えた。",
    state:"アプリまわりの<b>36候補が消灯</b>。……このあと、この消灯は取り消されることになる。"},
   {cut:null, revive:appsCut, cam:{yaw:0.05,pitch:0.25}, axes:axesA, reveal:false,
    t:"<b>5. 戻ってくる</b> — 消したはずの候補が再点灯する",
    act:"10分後、<b>また全面的に遅い</b>。再起動した個体も、していない個体も。",
    state:"<b>36候補が再点灯——残り候補が増えた</b>。「直したのに戻る」は重要な信号:壊れた部品を探す戦略そのものが空振りしている可能性。"},
   {cut:function(s){return s.kind==='host'&&(s.comp==='カーネル'||s.comp==='ランタイム'||s.comp==='構成');}, cam:{yaw:1.35,pitch:0.15}, axes:axesA, reveal:false,
    t:"<b>6. 収支を取る</b> — 入りより、中が多い",
    act:"LBに入ってくるユーザーのリクエストは平常の<b>1.1倍</b>。だがアプリに届いているリクエストは<b>4倍</b>。差分の正体は、<b>LBがタイムアウトした転送を別のバックエンドへ自動で出し直していた</b>こと(転送リトライ)——ヘルスチェックの通信ではなく、1つの着弾が複数の転送に増えていた。",
    state:"増幅に関与しない<b>36候補が消灯</b>。異常の量ではなく<b>収支の破れ</b>が、初めてこの問題を切った。"},
   {cut:function(s){return s.sk==='バックアップ';}, cam:{yaw:0.12,pitch:0.18}, axes:axesA, reveal:true,
    ring:ring, arrows:true, hideAxes:true,
    t:"<b>7. 並べ直すと、輪になる</b> — 収束先は点ではなく構造",
    act:"残った候補を経路の順に並べる——<b>始点も終点もない</b>。遅くなる→タイムアウト→リトライ→負荷が増える→さらに遅くなる。バックアップは火を点けただけで、いま燃え続けているのは<b>この輪</b>。",
    state:"トリガーの<b>6候補が消灯</b>(開始の説明であって、継続の説明ではない)。残り60は容疑者ではなく<b>輪の構成員</b>——探すフェーズは終わり、切るフェーズへ。"},
   {cut:null, cam:{yaw:0.12,pitch:0.18}, axes:axesA, reveal:true,
    ring:ring, arrows:true, hideAxes:true, cutEdge:5,
    t:"<b>8. 輪を切る</b> — どの部品も交換していない",
    act:"LBの<b>転送リトライを一時的に止める</b>(設定変更・すぐ戻せる)→<b>数分で全メトリクスが正常化</b>。",
    state:"輪はどこを切ってもよかった——切る場所は<b>副作用の小ささで選ぶ</b>(リトライ停止=影響最小・即時・可逆)。部品はひとつも壊れていなかった。"},
   {cut:null, cam:{yaw:0.12,pitch:0.18}, axes:axesA, reveal:true,
    ring:ring, arrows:true, hideAxes:true, cutEdge:5,
    t:"<b>9. 対応と再観測</b> — 輪を作りにくくする",
    act:"短期:リトライ抑制を維持しつつ段階的に解除。長期:リトライに<b>上限と揺らぎ(バックオフ+ジッタ)</b>を入れる、失敗が続いたら自動で止まる仕組み(サーキットブレーカ)、バックアップ時刻の変更。",
    state:"再観測で安定を確認して完了。<div class='opt'><em>次回への学び</em>:「急に全部が異常なら、犯人ではなく<b>増幅</b>を探す」「直したのに戻るなら、部品ではなく<b>構造</b>を疑う」。</div>"}
  ];
  return {suspects:S, frames:frames, causeSet:{}, causeLabel:'維持ループ',
    ringLabels:{'リトライ':'転送リトライ','LB':'LB','アプリ':'アプリ(飽和)','プール':'プール・キュー','DB':'DB','タイムアウト':'タイムアウト'}};
}

var SCN=[buildIntro(), buildSimple(), buildHard(), buildLoop()];
SCN.forEach(function(sc){
  var alive=sc.suspects.map(function(){return true;});
  sc.aliveByFrame=sc.frames.map(function(f){
    if(f.cut) alive=alive.map(function(a,i){return a && !f.cut(sc.suspects[i]);});
    if(f.revive) alive=alive.map(function(a,i){return a || f.revive(sc.suspects[i]);});
    return alive.slice();
  });
});
function frameCounts(si){
  return SCN[si].aliveByFrame.map(function(al){return al.filter(Boolean).length;});
}

// ============ 状態と描画 ============
var scn=0, fi=0;
var pos=[], posT=[], alpha=[], alphaT=[];

function initPositions(){
  var sc=SCN[scn];
  pos=sc.suspects.map(function(){return {x:0,y:0,z:0};});
  posT=sc.suspects.map(function(){return {x:0,y:0,z:0};});
  alpha=sc.suspects.map(function(){return 1;});
  alphaT=alpha.slice();
  applyFrame(true);
}
function applyFrame(snap){
  var sc=SCN[scn], f=sc.frames[fi], ax=f.axes;
  sc.suspects.forEach(function(s,i){
    var t={
      x:lvCoord(ax[0].get(s), ax[0].levels.length, i, 1),
      y:lvCoord(ax[1].get(s), ax[1].levels.length, i, 2),
      z:lvCoord(ax[2].get(s), ax[2].levels.length, i, 3)
    };
    if(f.cloud){ t=hazeXYZ(i, sc.suspects.length); }
    if(f.ring && s.loopClass && sc.aliveByFrame[fi][i]){
      var ri=f.ring.indexOf(s.loopClass);
      if(ri>=0){
        var ang=ri/f.ring.length*Math.PI*2 - Math.PI/2;
        t={x:Math.cos(ang)*140 + jit(i,4)*34, y:Math.sin(ang)*140 + jit(i,5)*34, z:jit(i,6)*18};
      }
    }
    posT[i]=t;
    alphaT[i]=sc.aliveByFrame[fi][i]?1:0.06;
    if(snap){ pos[i]={x:t.x,y:t.y,z:t.z}; alpha[i]=alphaT[i]; }
  });
  camAnim={y0:yaw,p0:pitch,y1:f.cam.yaw,p1:f.cam.pitch,st:performance.now(),T:900};
  var n=sc.aliveByFrame[fi].filter(Boolean).length;
  document.getElementById('cnt').textContent=f.cloud?'—':n;
  document.getElementById('barfill').style.width=(f.cloud?100:(n/sc.suspects.length*100))+'%';
  var tx=(lang==='en'&&ENT[scn]&&ENT[scn][fi])?ENT[scn][fi]:f;
  document.getElementById('ftitle').innerHTML=tx.t;
  document.getElementById('act').innerHTML=tx.act;
  document.getElementById('state').innerHTML=tx.state;
  document.getElementById('fdots').textContent=sc.frames.map(function(_,j){return j===fi?'●':'○';}).join('');
  document.getElementById('prev').disabled=(fi===0);
  document.getElementById('next').disabled=(fi===sc.frames.length-1);
}

function draw(){
  ctx.clearRect(0,0,W,H);
  var css=getComputedStyle(document.documentElement);
  var C={muted:css.getPropertyValue('--muted').trim(), faint:css.getPropertyValue('--faint').trim(),
         ink:css.getPropertyValue('--ink').trim(), line:css.getPropertyValue('--line').trim(),
         space:css.getPropertyValue('--space').trim(), dead:css.getPropertyValue('--dead').trim(),
         crash:css.getPropertyValue('--crash').trim(), fixed:css.getPropertyValue('--fixed').trim()};
  var sc=SCN[scn], f=sc.frames[fi], ax=f.axes;

  if(f.cloud){
    var fg=ctx.createRadialGradient(CX,CY,10,CX,CY,300);
    fg.addColorStop(0,'rgba(127,119,221,.30)');
    fg.addColorStop(0.7,'rgba(127,119,221,.12)');
    fg.addColorStop(1,'rgba(127,119,221,0)');
    ctx.fillStyle=fg; ctx.beginPath();
    ctx.ellipse(CX,CY,330,215,0,0,6.2832); ctx.fill();
  }

  var dirs=[[1,0,0],[0,1,0],[0,0,1]];
  ctx.lineWidth=1;
  if(!f.hideAxes) ax.forEach(function(a,ai){
    var d=dirs[ai];
    var p1=project(-d[0]*EXTENT,-d[1]*EXTENT,-d[2]*EXTENT);
    var p2=project( d[0]*EXTENT, d[1]*EXTENT, d[2]*EXTENT);
    ctx.strokeStyle=C.line; ctx.beginPath(); ctx.moveTo(p1[0],p1[1]); ctx.lineTo(p2[0],p2[1]); ctx.stroke();
    ctx.fillStyle=C.muted; ctx.font='12.5px sans-serif'; ctx.textAlign='left';
    ctx.fillText(tr(a.name), p2[0]+8, p2[1]+4);
    ctx.fillStyle=C.faint; ctx.font='10px sans-serif';
    var n=a.levels.length;
    var ticks=(a.tick==='all')?a.levels.map(function(_,i2){return i2;}):a.tick;
    ticks.forEach(function(li){
      var v=(li-(n-1)/2)/((n-1)/2||1)*EXTENT*0.72;
      var pt=project(d[0]*v,d[1]*v,d[2]*v);
      ctx.fillText(tr(a.levels[li]), pt[0]+5, pt[1]-4);
    });
  });

  var pulse=0.5+0.5*Math.sin(clock*0.006);
  var pts=sc.suspects.map(function(s,i){
    var p=project(pos[i].x,pos[i].y,pos[i].z);
    return {sx:p[0],sy:p[1],depth:p[2],i:i,s:s};
  });
  pts.sort(function(a,b){return a.depth-b.depth;});
  var frontCause=null;
  pts.forEach(function(p){
    var t=(p.depth+EXTENT*1.4)/(EXTENT*2.8);
    var a=alpha[p.i];
    if(f.cloud){
      ctx.globalAlpha=0.55*(0.45+0.55*t);
      ctx.fillStyle=C.space;
      ctx.beginPath(); ctx.arc(p.sx,p.sy,2.6,0,6.2832); ctx.fill();
      return;
    }
    var isCause=(f.reveal && sc.causeSet[p.s.name]);
    var r=(2.8+3.2*t)*(a>0.5?1:0.7);
    if(isCause){
      ctx.globalAlpha=0.2+0.25*pulse;
      ctx.fillStyle=C.crash;
      ctx.beginPath(); ctx.arc(p.sx,p.sy,r+6+3*pulse,0,6.2832); ctx.fill();
      frontCause=p;
    }
    ctx.globalAlpha=a*(0.5+0.5*t);
    ctx.fillStyle=isCause?C.crash:(a>0.5?C.space:C.dead);
    ctx.beginPath(); ctx.arc(p.sx,p.sy,r,0,6.2832); ctx.fill();
  });
  ctx.globalAlpha=1;

  // 輪の矢印
  if(f.ring && f.arrows){
    var n=f.ring.length;
    var anchors=f.ring.map(function(_,k){
      var ang=k/n*Math.PI*2 - Math.PI/2;
      return project(Math.cos(ang)*140, Math.sin(ang)*140, 0);
    });
    var col=(f.cutEdge!==undefined)?C.fixed:C.crash;
    var al=(f.cutEdge!==undefined)?0.75:(0.5+0.35*pulse);
    for(var k=0;k<n;k++){
      var A=anchors[k], B=anchors[(k+1)%n];
      var mx=(A[0]+B[0])/2, my=(A[1]+B[1])/2;
      var cx2=CX+(mx-CX)*1.42, cy2=CY+(my-CY)*1.42;
      if(f.cutEdge===k){
        ctx.fillStyle=C.crash; ctx.font='14px sans-serif'; ctx.textAlign='center';
        ctx.globalAlpha=1;
        ctx.fillText('✂', cx2, cy2+5);
        continue;
      }
      ctx.strokeStyle=col; ctx.globalAlpha=al; ctx.lineWidth=1.6;
      ctx.beginPath(); ctx.moveTo(A[0],A[1]);
      ctx.quadraticCurveTo(cx2,cy2,B[0],B[1]); ctx.stroke();
      var dx=B[0]-cx2, dy=B[1]-cy2, L=Math.sqrt(dx*dx+dy*dy)||1;
      dx/=L; dy/=L;
      ctx.beginPath();
      ctx.moveTo(B[0]-dx*10-dy*4, B[1]-dy*10+dx*4);
      ctx.lineTo(B[0],B[1]);
      ctx.lineTo(B[0]-dx*10+dy*4, B[1]-dy*10-dx*4);
      ctx.stroke();
    }
    ctx.globalAlpha=1;
    ctx.font='11.5px sans-serif';
    f.ring.forEach(function(cls,k){
      var ang=k/n*Math.PI*2 - Math.PI/2;
      var pt=project(Math.cos(ang)*196, Math.sin(ang)*196, 0);
      ctx.fillStyle=C.muted; ctx.textAlign='center';
      ctx.fillText(tr(sc.ringLabels[cls]), pt[0], pt[1]+4);
    });
    if(f.reveal && f.cutEdge===undefined){
      ctx.fillStyle=C.crash; ctx.globalAlpha=0.55+0.35*pulse;
      ctx.font='600 13px sans-serif'; ctx.textAlign='center';
      ctx.fillText(tr('維持ループ'), CX, CY+4);
      ctx.globalAlpha=1;
    }
    if(f.cutEdge!==undefined){
      ctx.fillStyle=C.fixed;
      ctx.font='600 13px sans-serif'; ctx.textAlign='center';
      ctx.fillText(tr('切断済み'), CX, CY+4);
    }
  }
  if(frontCause){
    ctx.fillStyle=C.ink; ctx.font='600 12px sans-serif'; ctx.textAlign='left';
    ctx.fillText(tr(sc.causeLabel), frontCause.sx+12, frontCause.sy-8);
    ctx.strokeStyle=C.crash; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(frontCause.sx+4,frontCause.sy-4); ctx.lineTo(frontCause.sx+10,frontCause.sy-8); ctx.stroke();
  }
}

// ============ ループ・操作 ============
function loop(t){
  clock=t||0;
  if(camAnim && !dragging){
    var u=Math.min(1,(t-camAnim.st)/camAnim.T);
    var e=u<0.5?2*u*u:1-Math.pow(-2*u+2,2)/2;
    yaw=camAnim.y0+wrapA(camAnim.y1-camAnim.y0)*e;
    pitch=camAnim.p0+(camAnim.p1-camAnim.p0)*e;
    if(u>=1)camAnim=null;
  }
  if(pos.length!==SCN[scn].suspects.length){ requestAnimationFrame(loop); return; }
  SCN[scn].suspects.forEach(function(_,i){
    pos[i].x+=(posT[i].x-pos[i].x)*0.12;
    pos[i].y+=(posT[i].y-pos[i].y)*0.12;
    pos[i].z+=(posT[i].z-pos[i].z)*0.12;
    alpha[i]+=(alphaT[i]-alpha[i])*0.1;
  });
  draw();
  requestAnimationFrame(loop);
}

cv.addEventListener('pointerdown',function(e){dragging=true;camAnim=null;px=e.clientX;py=e.clientY;cv.setPointerCapture(e.pointerId);});
cv.addEventListener('pointermove',function(e){
  if(!dragging)return;
  yaw+=(e.clientX-px)*0.008; pitch+=(e.clientY-py)*0.006;
  pitch=Math.max(-1.5,Math.min(1.5,pitch));
  px=e.clientX;py=e.clientY;
});
cv.addEventListener('pointerup',function(){dragging=false;});
cv.addEventListener('pointercancel',function(){dragging=false;});

function go(d){
  var sc=SCN[scn];
  var ni=Math.max(0,Math.min(sc.frames.length-1,fi+d));
  if(ni===fi)return;
  fi=ni; applyFrame(false);
}
document.getElementById('prev').onclick=function(){go(-1);};
document.getElementById('next').onclick=function(){go(1);};
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight')go(1);
  if(e.key==='ArrowLeft')go(-1);
});
function setScn(i){
  scn=i; fi=0;
  for(var k=0;k<4;k++) document.getElementById('t'+k).classList.toggle('on',i===k);
  initPositions();
}
document.getElementById('t0').onclick=function(){setScn(0);};
document.getElementById('t1').onclick=function(){setScn(1);};
document.getElementById('t2').onclick=function(){setScn(2);};
document.getElementById('t3').onclick=function(){setScn(3);};
document.getElementById('langbtn').onclick=function(){setLang(lang==='ja'?'en':'ja');};
setScn(0);
setLang('en');
(function(){
  var q=location.search;
  if(/[?&]embed=1/.test(q)){
    document.getElementById('h1').style.display='none';
    document.getElementById('sub').style.display='none';
  }
  var m=/[?&]scn=([0-3])/.exec(q); if(m) setScn(+m[1]);
  var l=/[?&]lang=(ja|en)/.exec(q); if(l) setLang(l[1]);
})();
requestAnimationFrame(loop);
</script>
